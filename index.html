<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pretty Dolls</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#FFEDF4;
}

header{
background:#FF8EB9;
color:white;
text-align:center;
padding:18px;
font-size:28px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
}

.instagram{
text-align:center;
margin:15px;
}

.instagram a{
background:#E1306C;
color:white;
padding:10px 18px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
display:inline-block;
}

.banner{
margin:15px;
padding:25px;
border-radius:20px;
text-align:center;
background:linear-gradient(45deg,#ff8eb9,#ffbfd8);
color:white;
}

.banner h2{
margin:0;
}

.search-box{
text-align:center;
margin:15px;
}

.search-box input{
width:70%;
padding:12px;
border:none;
border-radius:25px;
font-size:15px;
outline:none;
}

.categorias{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.categorias button{
background:#ff7fb2;
color:white;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:12px;
margin-right:250px;
}

.card{
background:white;
border-radius:12px;
padding:8px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
overflow:hidden;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
border-radius:8px;
}

.price{
font-size:14px;
font-weight:bold;
margin-bottom:5px;
}

.buy-btn{
background:#ff7fb2;
color:white;
border:none;
padding:6px;
width:100%;
border-radius:15px;
cursor:pointer;
}

.qty{
display:flex;
justify-content:center;
gap:8px;
margin:8px;
}

.qty-btn{
width:28px;
height:28px;
border:none;
border-radius:50%;
background:#ffb8d2;
cursor:pointer;
}

#cart{
position:fixed;
right:10px;
top:10px;
width:220px;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
z-index:999;
}

.small{
font-size:11px;
margin-bottom:5px;
}

.remove{
border:none;
background:none;
cursor:pointer;
}

#topBtn{
display:none;
position:fixed;
bottom:20px;
right:20px;
border:none;
border-radius:50%;
width:50px;
height:50px;
background:#ff7fb2;
color:white;
font-size:20px;
cursor:pointer;
}

@media(max-width:768px){

.container{
grid-template-columns:repeat(2,1fr);
margin-right:0;
padding:8px;
gap:12px;
}

.card img{
height:180px;
}

#cart{
position:relative;
width:auto;
margin:10px;
border-radius:15px;
}

}

</style>
</head>

<body>

<header>
𝑷𝒓𝒆𝒕𝒕𝒚 𝑫𝒐𝒍𝒍𝒔
</header>

<div class="instagram">
<a href="https://instagram.com/prettydolls.ok" target="_blank">
📷 Seguinos en Instagram
</a>
</div>

<div class="banner">
<h2>💖 Pretty Dolls 💖</h2>
<p>Maquillaje y accesorios para resaltar tu estilo</p>
</div>

<div class="search-box">
<input
type="text"
id="busqueda"
placeholder="🔍 Buscar productos..."
onkeyup="buscar()">
</div>

<div class="categorias">

<button onclick="filtrar('Todos')">Todos</button>
<button onclick="filtrar('Maquillaje')">Maquillaje</button>
<button onclick="filtrar('Brochas y Aplicadores')">Brochas</button>
<button onclick="filtrar('Accesorios')">Accesorios</button>

</div>

<div id="cart">

<b id="cart-title">
🛒 Tu pedido (0)
</b>

<div id="items"></div>

<button class="buy-btn"
onclick="sendOrder()">

Enviar pedido 💬

</button>

</div>

<div class="container"
id="productos">

</div>

<button id="topBtn"
onclick="subir()">

⬆

</button>

<script>

const URL="https://opensheet.elk.sh/1lA5xF3f3DQwYEg9-cFPf6HvMfSBDgNJ5my8VTo7RKnI/Hoja1";

let cart=[];
let cantidades={};
let productos=[];

async function cargar(){

let res=await fetch(URL);

productos=await res.json();

mostrar(productos);

}

function mostrar(data){

let cont=
document.getElementById(
"productos"
);

cont.innerHTML="";

data.forEach((p,i)=>{

if(!p.nombre)return;

cantidades[i]=1;

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}">

<h4>${p.nombre}</h4>

<div class="price">
$${p.precio}
</div>

<div class="qty">

<button class="qty-btn"
onclick="menos(${i})">

➖

</button>

<span id="cantidad${i}">
1
</span>

<button class="qty-btn"
onclick="mas(${i})">

➕

</button>

</div>

<button class="buy-btn"

onclick="add(
'${p.nombre}',
${p.precio},
${i}
)">

Agregar 🛒

</button>

</div>

`;

});

}

function buscar(){

let texto=
document.getElementById(
"busqueda"
).value.toLowerCase();

let filtrados=
productos.filter(p=>

p.nombre
.toLowerCase()
.includes(texto)

);

mostrar(filtrados);

}

function filtrar(categoria){

if(categoria=="Todos"){

mostrar(productos);

return;

}

let filtrados=
productos.filter(p=>

p.categoria &&
p.categoria
.toLowerCase()
===categoria
.toLowerCase()

);

mostrar(filtrados);

}

function mas(i){

cantidades[i]++;

document.getElementById(
"cantidad"+i
).innerText=
cantidades[i];

}

function menos(i){

if(cantidades[i]>1){

cantidades[i]--;

document.getElementById(
"cantidad"+i
).innerText=
cantidades[i];

}

}

function add(name,price,i){

cart.push({

name:name,
price:Number(price),
cantidad:cantidades[i]

});

render();

}

function remove(i){

cart.splice(i,1);

render();

}

function render(){

let box=
document.getElementById(
"items"
);

box.innerHTML="";

let total=0;

cart.forEach((p,i)=>{

let subtotal=
p.price*p.cantidad;

box.innerHTML+=`

<div class="small">

${p.cantidad}x
${p.name}

$${subtotal}

<button
class="remove"
onclick="remove(${i})">

❌

</button>

</div>

`;

total+=subtotal;

});

box.innerHTML+=
`<hr><b>
Total: $${total}
</b>`;

document
.getElementById(
"cart-title"
)
.innerText=

`🛒 Tu pedido (${cart.length})`;

}

function sendOrder(){

let msg=
"💖 Hola! Quiero hacer este pedido:%0A%0A";

let total=0;

cart.forEach(p=>{

let subtotal=
p.price*p.cantidad;

msg+=
`${p.cantidad}x ${p.name}
- $${subtotal}%0A`;

total+=subtotal;

});

msg+=
`%0A💰 Total:
$${total}`;

window.open(

`https://wa.me/5491135975714?text=${msg}`

);

}

function subir(){

window.scrollTo({

top:0,
behavior:"smooth"

});

}

window.onscroll=
function(){

let btn=
document.getElementById(
"topBtn"
);

if(
document.documentElement
.scrollTop>200
){

btn.style.display=
"block";

}else{

btn.style.display=
"none";

}

}

cargar();

</script>

</body>
</html>
