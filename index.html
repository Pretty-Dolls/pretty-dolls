<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pretty Dolls</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#FFEDF4;
}

header{
background:#FF8EB9;
color:white;
text-align:center;
padding:18px;
font-size:28px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:12px;
margin-right:250px;
}

.card{
background:white;
border-radius:12px;
padding:6px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
overflow:hidden;
}

.card img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
border-radius:8px;
}

.card h4{
font-size:12px;
margin:6px 0;
}

.price{
font-size:14px;
font-weight:bold;
margin-bottom:5px;
}

button{
background:#ff7fb2;
color:white;
border:none;
padding:6px;
width:100%;
border-radius:15px;
cursor:pointer;
font-size:11px;
transition:.3s;
}

button:hover{
background:#ff5f9d;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin:8px 0;
}

.qty button{
width:30px;
padding:4px;
}

#cart{
position:fixed;
right:10px;
top:10px;
width:220px;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
font-size:12px;
z-index:1000;
}

.small{
font-size:11px;
margin-bottom:5px;
}

.remove{
width:25px !important;
padding:2px !important;
margin-left:5px;
}

@media(max-width:768px){

.container{
grid-template-columns:repeat(2,1fr);
margin-right:0;
}

#cart{
position:relative;
width:auto;
margin:10px;
}

}

</style>

</head>

<body>

<header>
𝑷𝒓𝒆𝒕𝒕𝒚 𝑫𝒐𝒍𝒍𝒔 💖
</header>

<div id="cart">

<b>🛒 Tu pedido</b>

<div id="items"></div>

<button onclick="sendOrder()">
Enviar pedido 💬
</button>

</div>

<div class="container" id="productos"></div>

<script>

const URL="https://opensheet.elk.sh/1lA5xF3f3DQwYEg9-cFPf6HvMfSBDgNJ5my8VTo7RKnI/Hoja1";

let cart=[];
let cantidades={};

async function cargar(){

let res=await fetch(URL);
let data=await res.json();

let cont=document.getElementById("productos");

cont.innerHTML="";

data.forEach((p,i)=>{

cantidades[i]=1;

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}">

<h4>${p.nombre}</h4>

<div class="price">

$${p.precio}

</div>

<div class="qty">

<button onclick="menos(${i})">
➖
</button>

<span id="cantidad${i}">
1
</span>

<button onclick="mas(${i})">
➕
</button>

</div>

<button onclick="add('${p.nombre}',${p.precio},${i})">

Agregar 🛒

</button>

</div>

`;

});

}

function mas(i){

cantidades[i]++;

document.getElementById(
"cantidad"+i
).innerText=cantidades[i];

}

function menos(i){

if(cantidades[i]>1){

cantidades[i]--;

document.getElementById(
"cantidad"+i
).innerText=cantidades[i];

}

}

function add(name,price,i){

cart.push({

name:name,
price:Number(price),
cantidad:cantidades[i]

});

render();

}

function remove(index){

cart.splice(index,1);

render();

}

function render(){

let box=document.getElementById("items");

box.innerHTML="";

let total=0;

cart.forEach((p,index)=>{

let subtotal=
p.price*p.cantidad;

box.innerHTML+=`

<div class="small">

${p.cantidad}x ${p.name}

- $${subtotal}

<button
class="remove"
onclick="remove(${index})">

❌

</button>

</div>

`;

total+=subtotal;

});

box.innerHTML+=`

<hr>

<b>Total: $${total}</b>

`;

}

function sendOrder(){

let msg="💖 Hola! Quiero hacer este pedido:%0A%0A";

let total=0;

cart.forEach(p=>{

let subtotal=
p.price*p.cantidad;

msg+=`${p.cantidad}x ${p.name} - $${subtotal}%0A`;

total+=subtotal;

});

msg+=`%0A💰 Total: $${total}`;

let phone="5491135975714";

window.open(
`https://wa.me/${phone}?text=${msg}`,
"_blank"
);

}

cargar();

</script>

</body>
</html>
